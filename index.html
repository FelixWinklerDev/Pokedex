<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felixs Pokèdex</title>
    <link rel="shortcut icon" href="./assets/img/fav.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/colors.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/global.css">
    <script src="script.js"></script>
    <script src="./scripts/templates.js"></script>
</head>
<body onload="getPokemonData(), loadSearchIndex()">
  <header class="header-container" id="topbase">
    <div class="header-wrapper">
      <img class="pokeball" src="./assets/img/95c-pokeball-1594373_1280.png" alt="Pokéball">
      <img class="logo" src="./assets/img/Pekedex.png" alt="Logo">
    </div>  
    <section id="search">
      <input id="searchInput" type="text" oninput="processSearchInput()">
      <button class="header-btn" onclick="findPokemon()">search</button>
    </section>
    <section id="suggestions">
      <p id="error-message"></p>
    </section>
  </header>
  <main id="content">

  </main>
  <section class="button-position">
    <button class="loading-btn" onclick="getPokemonData()">bring more Pokèmon</button>
  </section>
  <section class="d-none" id="loading-overlay">
    <div class="loading-screen">
      <div class="spinner">
        <img class="loading-spinner" src="./assets/icons/alanyadk-pokemon-1536849_640.png" alt="Pokèball">
        <p>Loading Pokèmon...</p>
      </div> 
    </div>
  </section>
  <dialog id="dialog-container">

  </dialog>

  <footer>
    <a href="#topbase">©Felixs Pokèdex 2026</a>
    <a href="./imprint.html" target="_blank">Imprint</a>
    <a href="https://youtu.be/YUnvdq9_TKI?si=NFotVxdKXbVo_c3L" target="_blank">Coockie References</a>
  </footer>
</body>
</html>
